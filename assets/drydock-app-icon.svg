      <stop offset="0%" stop-color="#0A2551"/>
      <stop offset="100%" stop-color="#071B3A"/>
    </linearGradient>
    <linearGradient id="gCyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1EC8F3"/>
      <stop offset="100%" stop-color="#178FE6"/>
