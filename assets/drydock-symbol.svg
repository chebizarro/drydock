      <stop offset="0%" stop-color="#1EC8F3"/>
      <stop offset="100%" stop-color="#178FE6"/>
    </linearGradient>
    <linearGradient id="gLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8EEF7"/>
