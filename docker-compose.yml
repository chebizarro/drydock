# Drydock microservices topology
#
# Default:  docker compose up -d          → drydock-core + qdrant
# With LSP: docker compose --profile lsp up -d → + lsp-bridge
#
# All external services are optional. drydock-core degrades gracefully
# when Qdrant or LSP bridge are unavailable.

services:
  # --- Core review pipeline ---
  drydock-core:
    build:
      context: .
      dockerfile: Dockerfile
    image: drydock:latest
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      # Persistence
      DRYDOCK_DATABASE_URL: ${DRYDOCK_DATABASE_URL:-file:/data/drydock.db?_pragma=foreign_keys(1)&_pragma=busy_timeout(5000)}
      DRYDOCK_REPO_CACHE_DIR: ${DRYDOCK_REPO_CACHE_DIR:-/data/repos}
      DRYDOCK_EVAL_DATASET_PATH: ${DRYDOCK_EVAL_DATASET_PATH:-/app/eval/heldout-sample.json}
      DRYDOCK_REPO_CACHE_MAX_COUNT: ${DRYDOCK_REPO_CACHE_MAX_COUNT:-50}
      DRYDOCK_REPO_CACHE_MAX_SIZE_MB: ${DRYDOCK_REPO_CACHE_MAX_SIZE_MB:-10240}
      # Nostr
      DRYDOCK_RELAYS: ${DRYDOCK_RELAYS:-wss://relay.damus.io,wss://nos.lol,wss://relay.primal.net}
      DRYDOCK_READ_RELAYS: ${DRYDOCK_READ_RELAYS:-}
      DRYDOCK_WRITE_RELAYS: ${DRYDOCK_WRITE_RELAYS:-}
      DRYDOCK_LOG_LEVEL: ${DRYDOCK_LOG_LEVEL:-info}
      # Signing (NIP-46 bunker required outside dev mode)
      DRYDOCK_SIGNER_BUNKER_URL: ${DRYDOCK_SIGNER_BUNKER_URL:?Set DRYDOCK_SIGNER_BUNKER_URL in .env before starting Drydock}
      DRYDOCK_SIGNER_SOCKET_PATH: ${DRYDOCK_SIGNER_SOCKET_PATH:-}
      DRYDOCK_SIGNER_NSEC: ${DRYDOCK_SIGNER_NSEC:-}
      # LLM endpoints
      DRYDOCK_LLM_API_KEY: ${DRYDOCK_LLM_API_KEY:-}
      DRYDOCK_PLANNER_BASE_URL: ${DRYDOCK_PLANNER_BASE_URL:-http://host.docker.internal:11434/v1}
      DRYDOCK_PLANNER_MODEL: ${DRYDOCK_PLANNER_MODEL:-qwen2.5-coder-14b-instruct-q4_k_m}
      DRYDOCK_CODER32B_BASE_URL: ${DRYDOCK_CODER32B_BASE_URL:-http://host.docker.internal:11434/v1}
      DRYDOCK_CODER32B_MODEL: ${DRYDOCK_CODER32B_MODEL:-qwen2.5-coder-32b-instruct-q4_k_m}
      DRYDOCK_LLM70B_BASE_URL: ${DRYDOCK_LLM70B_BASE_URL:-http://host.docker.internal:11435/v1}
      DRYDOCK_LLM70B_MODEL: ${DRYDOCK_LLM70B_MODEL:-llama-3.3-70b-instruct-q4_k_m}
      DRYDOCK_CODER14B_BASE_URL: ${DRYDOCK_CODER14B_BASE_URL:-http://host.docker.internal:11434/v1}
      DRYDOCK_CODER14B_MODEL: ${DRYDOCK_CODER14B_MODEL:-qwen2.5-coder-14b-instruct-q4_k_m}
      DRYDOCK_META_BASE_URL: ${DRYDOCK_META_BASE_URL:-http://host.docker.internal:11436/v1}
      DRYDOCK_META_MODEL: ${DRYDOCK_META_MODEL:-llama-3.3-70b-instruct-q4_k_m}
      # Qdrant vector store (service name on shared network)
      DRYDOCK_QDRANT_URL: ${DRYDOCK_QDRANT_URL:-http://qdrant:6333}
      DRYDOCK_QDRANT_API_KEY: ${DRYDOCK_QDRANT_API_KEY:-}
      # Embedding model
      DRYDOCK_EMBED_BASE_URL: ${DRYDOCK_EMBED_BASE_URL:-}
      DRYDOCK_EMBED_MODEL: ${DRYDOCK_EMBED_MODEL:-nomic-embed-text}
      DRYDOCK_EMBED_API_KEY: ${DRYDOCK_EMBED_API_KEY:-}
      # LSP bridge (service name on shared network)
      DRYDOCK_LSP_BRIDGE_URL: ${DRYDOCK_LSP_BRIDGE_URL:-http://lsp-bridge:8082}
    volumes:
      - drydock_data:/data
      - ./eval:/app/eval:ro
    networks:
      - drydock_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- Qdrant vector database ---
  qdrant:
    image: qdrant/qdrant:v1.12.6
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "${QDRANT_HOST_PORT:-6333}:6333"  # REST API
      - "${QDRANT_GRPC_PORT:-6334}:6334"  # gRPC (unused by drydock, exposed for debugging)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - drydock_net

  # --- LSP bridge (optional — activate with: docker compose --profile lsp up) ---
  lsp-bridge:
    build:
      context: .
      dockerfile: docker/lsp-bridge/Dockerfile
    image: drydock-lsp-bridge:latest
    restart: unless-stopped
    profiles:
      - lsp
    volumes:
      - drydock_data:/data:ro  # read-only access to repo cache
    ports:
      - "${LSP_BRIDGE_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 30s  # language servers need time to initialize
      retries: 3
    networks:
      - drydock_net

volumes:
  drydock_data:
  qdrant_storage:

networks:
  drydock_net:
    driver: bridge
